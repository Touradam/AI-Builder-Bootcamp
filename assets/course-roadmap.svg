<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Education Program course roadmap</title>
  <desc id="desc">A six week course roadmap for the AI Education Program — from first website and browser game to AI Chrome extension and shipped capstone tool.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0c0f"/>
      <stop offset="0.45" stop-color="#12121a"/>
      <stop offset="1" stop-color="#070708"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="35%" r="65%">
      <stop offset="0" stop-color="#c4a35a" stop-opacity="0.34"/>
      <stop offset="0.42" stop-color="#c4a35a" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#c4a35a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9a7b3c"/>
      <stop offset="0.48" stop-color="#e2c887"/>
      <stop offset="1" stop-color="#c4a35a"/>
    </linearGradient>
    <linearGradient id="cardGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f1f28"/>
      <stop offset="1" stop-color="#12121a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="goldBloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#c4a35a" opacity="0.18"/>
    </pattern>
    <clipPath id="weekCardClip">
      <rect width="242" height="292" rx="22"/>
    </clipPath>
  </defs>

  <rect width="1600" height="900" fill="url(#bgGradient)"/>
  <rect width="1600" height="900" fill="url(#goldGlow)"/>
  <rect width="1600" height="900" fill="url(#dotGrid)" opacity="0.38"/>

  <g opacity="0.28" stroke="#c4a35a" stroke-width="1.2" fill="none">
    <path d="M-20 220 C180 155 330 165 500 230 S850 330 1040 235 1340 100 1620 170"/>
    <path d="M-20 760 C250 700 420 730 610 790 S970 880 1205 760 1450 620 1620 670"/>
    <path d="M1230 65 L1305 65 L1305 120 L1378 120"/>
    <path d="M116 705 L205 705 L205 650 L278 650"/>
    <circle cx="1378" cy="120" r="4" fill="#c4a35a"/>
    <circle cx="278" cy="650" r="4" fill="#c4a35a"/>
  </g>

  <g font-family="Outfit, DM Sans, Segoe UI, Arial, sans-serif">
    <text x="110" y="95" fill="#c4a35a" font-size="22" font-weight="700" letter-spacing="4">AI EDUCATION PROGRAM</text>
    <text x="110" y="158" fill="#eceae4" font-size="58" font-weight="700" letter-spacing="-1.5">Course Roadmap</text>
    <text x="110" y="203" fill="#b8b5ae" font-size="25">From zero code to shipped projects with Cursor.</text>

    <g transform="translate(1180 76)">
      <rect x="0" y="0" width="300" height="96" rx="24" fill="#18181f" stroke="#c4a35a" stroke-opacity="0.32"/>
      <text x="28" y="38" fill="#e2c887" font-size="25" font-weight="700">6 Weeks</text>
      <text x="28" y="72" fill="#eceae4" font-size="21">12 live sessions</text>
      <line x1="162" y1="22" x2="162" y2="74" stroke="#c4a35a" stroke-opacity="0.28"/>
      <text x="188" y="38" fill="#e2c887" font-size="25" font-weight="700">Friends</text>
      <text x="188" y="72" fill="#eceae4" font-size="21">Beta cohort</text>
    </g>
  </g>

  <path d="M195 460 C345 338 470 338 610 458 S875 592 1010 462 1270 330 1408 458" fill="none" stroke="#4b3d22" stroke-width="22" stroke-linecap="round" opacity="0.52"/>
  <path d="M195 460 C345 338 470 338 610 458 S875 592 1010 462 1270 330 1408 458" fill="none" stroke="url(#goldStroke)" stroke-width="8" stroke-linecap="round" filter="url(#goldBloom)"/>

  <g font-family="DM Sans, Segoe UI, Arial, sans-serif" filter="url(#softShadow)">
    <g transform="translate(40 318)" clip-path="url(#weekCardClip)">
      <rect width="242" height="292" rx="22" fill="url(#cardGradient)" stroke="#c4a35a" stroke-opacity="0.34"/>
      <circle cx="38" cy="42" r="24" fill="#c4a35a"/>
      <text x="38" y="49" text-anchor="middle" fill="#0c0c0f" font-size="20" font-weight="800">1</text>
      <text x="72" y="34" fill="#e2c887" font-size="11" font-weight="800" letter-spacing="1.2">WEEK 1</text>
      <text x="72" y="52" fill="#eceae4" font-size="14" font-weight="800">
        <tspan x="72" dy="0">AI + First</tspan>
        <tspan x="72" dy="16">Site</tspan>
      </text>
      <text x="16" y="92" fill="#d8d5ce" font-size="11" font-weight="700">
        <tspan x="16" dy="0">Cursor setup,</tspan>
        <tspan x="16" dy="14">HTML &amp; CSS</tspan>
      </text>
      <text x="16" y="134" fill="#9c9a94" font-size="12">S1: AI + Cursor</text>
      <text x="16" y="154" fill="#9c9a94" font-size="12">S2: Build site</text>
      <rect x="16" y="228" width="210" height="38" rx="12" fill="#c4a35a" fill-opacity="0.14" stroke="#c4a35a" stroke-opacity="0.28"/>
      <text x="121" y="244" text-anchor="middle" fill="#e2c887" font-size="10" font-weight="700">Outcome:</text>
      <text x="121" y="258" text-anchor="middle" fill="#e2c887" font-size="10" font-weight="700">site structure built</text>
    </g>

    <g transform="translate(298 466)" clip-path="url(#weekCardClip)">
      <rect width="242" height="292" rx="22" fill="url(#cardGradient)" stroke="#c4a35a" stroke-opacity="0.34"/>
      <circle cx="38" cy="42" r="24" fill="#c4a35a"/>
      <text x="38" y="49" text-anchor="middle" fill="#0c0c0f" font-size="20" font-weight="800">2</text>
      <text x="72" y="34" fill="#e2c887" font-size="11" font-weight="800" letter-spacing="1.2">WEEK 2</text>
      <text x="72" y="52" fill="#eceae4" font-size="14" font-weight="800">Deploy Site</text>
      <text x="16" y="84" fill="#d8d5ce" font-size="11" font-weight="700">
        <tspan x="16" dy="0">GitHub Pages +</tspan>
        <tspan x="16" dy="14">web foundations</tspan>
      </text>
      <text x="16" y="134" fill="#9c9a94" font-size="12">S3: GitHub Pages</text>
      <text x="16" y="154" fill="#9c9a94" font-size="12">S4: How the web works</text>
      <rect x="16" y="228" width="210" height="38" rx="12" fill="#c4a35a" fill-opacity="0.14" stroke="#c4a35a" stroke-opacity="0.28"/>
      <text x="121" y="244" text-anchor="middle" fill="#e2c887" font-size="10" font-weight="700">Outcome:</text>
      <text x="121" y="258" text-anchor="middle" fill="#e2c887" font-size="10" font-weight="700">live website</text>
    </g>

    <g transform="translate(556 318)" clip-path="url(#weekCardClip)">
      <rect width="242" height="292" rx="22" fill="url(#cardGradient)" stroke="#c4a35a" stroke-opacity="0.34"/>
      <circle cx="38" cy="42" r="24" fill="#c4a35a"/>
      <text x="38" y="49" text-anchor="middle" fill="#0c0c0f" font-size="20" font-weight="800">3</text>
      <text x="72" y="34" fill="#e2c887" font-size="11" font-weight="800" letter-spacing="1.2">WEEK 3</text>
      <text x="72" y="52" fill="#eceae4" font-size="14" font-weight="800">Build a Game</text>
      <text x="16" y="92" fill="#d8d5ce" font-size="11" font-weight="700">JavaScript + Git</text>
      <text x="16" y="134" fill="#9c9a94" font-size="12">S5: Build a game</text>
      <text x="16" y="154" fill="#9c9a94" font-size="12">S6: Git mastery</text>
      <rect x="16" y="228" width="210" height="38" rx="12" fill="#c4a35a" fill-opacity="0.14" stroke="#c4a35a" stroke-opacity="0.28"/>
      <text x="121" y="244" text-anchor="middle" fill="#e2c887" font-size="10" font-weight="700">Outcome:</text>
      <text x="121" y="258" text-anchor="middle" fill="#e2c887" font-size="10" font-weight="700">playable game</text>
    </g>

    <g transform="translate(814 466)" clip-path="url(#weekCardClip)">
      <rect width="242" height="292" rx="22" fill="url(#cardGradient)" stroke="#c4a35a" stroke-opacity="0.34"/>
      <circle cx="38" cy="42" r="24" fill="#c4a35a"/>
      <text x="38" y="49" text-anchor="middle" fill="#0c0c0f" font-size="20" font-weight="800">4</text>
      <text x="72" y="34" fill="#e2c887" font-size="11" font-weight="800" letter-spacing="1.2">WEEK 4</text>
      <text x="72" y="52" fill="#eceae4" font-size="14" font-weight="800">
        <tspan x="72" dy="0">Extension</tspan>
        <tspan x="72" dy="16">Shell</tspan>
      </text>
      <text x="16" y="92" fill="#d8d5ce" font-size="11" font-weight="700">Chrome + chat UI</text>
      <text x="16" y="134" fill="#9c9a94" font-size="12">S7: Extension basics</text>
      <text x="16" y="154" fill="#9c9a94" font-size="12">S8: Build chat UI</text>
      <rect x="16" y="228" width="210" height="38" rx="12" fill="#c4a35a" fill-opacity="0.14" stroke="#c4a35a" stroke-opacity="0.28"/>
      <text x="121" y="244" text-anchor="middle" fill="#e2c887" font-size="10" font-weight="700">Outcome:</text>
      <text x="121" y="258" text-anchor="middle" fill="#e2c887" font-size="10" font-weight="700">extension UI ready</text>
    </g>

    <g transform="translate(1072 318)" clip-path="url(#weekCardClip)">
      <rect width="242" height="292" rx="22" fill="url(#cardGradient)" stroke="#c4a35a" stroke-opacity="0.34"/>
      <circle cx="38" cy="42" r="24" fill="#c4a35a"/>
      <text x="38" y="49" text-anchor="middle" fill="#0c0c0f" font-size="20" font-weight="800">5</text>
      <text x="72" y="34" fill="#e2c887" font-size="11" font-weight="800" letter-spacing="1.2">WEEK 5</text>
      <text x="72" y="52" fill="#eceae4" font-size="14" font-weight="800">Connect AI</text>
      <text x="16" y="84" fill="#d8d5ce" font-size="11" font-weight="700">
        <tspan x="16" dy="0">Safe API +</tspan>
        <tspan x="16" dy="14">capstone plan</tspan>
      </text>
      <text x="16" y="134" fill="#9c9a94" font-size="12">S9: Connect API</text>
      <text x="16" y="154" fill="#9c9a94" font-size="12">S10: Plan + hosting</text>
      <rect x="16" y="228" width="210" height="38" rx="12" fill="#c4a35a" fill-opacity="0.14" stroke="#c4a35a" stroke-opacity="0.28"/>
      <text x="121" y="244" text-anchor="middle" fill="#e2c887" font-size="10" font-weight="700">Outcome:</text>
      <text x="121" y="258" text-anchor="middle" fill="#e2c887" font-size="10" font-weight="700">working AI chat</text>
    </g>

    <g transform="translate(1330 466)" clip-path="url(#weekCardClip)">
      <rect width="242" height="292" rx="22" fill="url(#cardGradient)" stroke="#c4a35a" stroke-opacity="0.34"/>
      <circle cx="38" cy="42" r="24" fill="#c4a35a"/>
      <text x="38" y="49" text-anchor="middle" fill="#0c0c0f" font-size="20" font-weight="800">6</text>
      <text x="72" y="34" fill="#e2c887" font-size="11" font-weight="800" letter-spacing="1.2">WEEK 6</text>
      <text x="72" y="52" fill="#eceae4" font-size="14" font-weight="800">Demo Day</text>
      <text x="16" y="84" fill="#d8d5ce" font-size="11" font-weight="700">
        <tspan x="16" dy="0">Capstone sprint +</tspan>
        <tspan x="16" dy="14">deploy</tspan>
      </text>
      <text x="16" y="134" fill="#9c9a94" font-size="12">S11: Build sprint</text>
      <text x="16" y="154" fill="#9c9a94" font-size="12">S12: Demo Day</text>
      <rect x="16" y="228" width="210" height="38" rx="12" fill="#c4a35a" fill-opacity="0.14" stroke="#c4a35a" stroke-opacity="0.28"/>
      <text x="121" y="244" text-anchor="middle" fill="#e2c887" font-size="10" font-weight="700">Outcome:</text>
      <text x="121" y="258" text-anchor="middle" fill="#e2c887" font-size="10" font-weight="700">useful tool live</text>
    </g>
  </g>
</svg>
